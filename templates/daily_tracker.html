{% extends "template.html" %}

{% block title %}
Daily Tracker
{% endblock %}

{% block links %}
<link rel="stylesheet" href="{{ url_for('static', filename='CSS/daily_tracker.css') }}">
{% endblock %}

{% block main %}
<div class="titlediv">
    <h5>{{daily_tracker.date}}</h5>
</div>
<div class="div50width">
    <div class="div50height">
        <div class="slider-container">
            <h2>Mood Score</h2>
            <input
                type="range"
                id="mood-slider"
                min="1"
                max="100"
                value="{{daily_tracker.mood_score}}"
                step="1"
                oninput="updateMoodDisplay(this.value)"
            />
            <span id="mood-display">{{daily_tracker.mood_score}}</span>
        </div>        
    </div>
    <div class="bottomdiv">
        <h2>Comment</h2>
        <p id="daily-tracker-comment" contenteditable="true">{{daily_tracker.comment}}</p>
        <br>
        <div class="buttons">
            <button id="save-button" onclick="saveDailyTracker()" aria-label="Save Daily Tracker">Save</button>
            <button id="cancel-button" onclick="cancelEdit()" aria-label="Cancel Daily Tracker">Cancel</button>
            <button id="delete-button" onclick="deleteDailyTracker()" aria-label="Delete Daily Tracker">Delete</button>
        </div>
    </div>
    <input type="hidden" id="daily-tracker-id" value="{{ daily_tracker.id }}">
    <input type="hidden" id="wakeup-time" value="{{ daily_tracker.wakeup_time }}">
    <input type="hidden" id="bed-time" value="{{ daily_tracker.bed_time }}">
</div>
<div class="div50width">
    <h1>Time Log</h1>
    <br>
    <div class="dropdown-container bedtime">
        <label for="bedtime" class="label">Bedtime:</label>
        <select id="bedtime-hour" class="dropdown">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
        </select>        
        :
        <select id="bedtime-minute" class="dropdown">
            <option value="00">00</option>
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="45">45</option>
        </select>
        <select id="bedtime-period" class="dropdown">
            <option value="AM">AM</option>
            <option value="PM" selected>PM</option>
        </select>
    </div>
    <br>
    <div class="dropdown-container wakeup">
        <label for="wakeup" class="label">Wakeup Time:</label>
        <select id="wakeup-hour" class="dropdown">
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="7">7</option>
            <option value="8">8</option>
            <option value="9">9</option>
            <option value="10">10</option>
            <option value="11">11</option>
            <option value="12">12</option>
        </select>        
        :
        <select id="wakeup-minute" class="dropdown">
            <option value="00">00</option>
            <option value="15">15</option>
            <option value="30">30</option>
            <option value="45">45</option>
        </select>
        <select id="wakeup-period" class="dropdown">
            <option value="AM">AM</option>
            <option value="PM" selected>PM</option>
        </select>
    </div>
    <br>
    <p id="sleep-hours"></p>
    <br>
    <div class="time-input-container">
        <label for="minutes-input" class="label">Exercise Minutes:</label>
        <input 
            type="number" 
            id="exercise-mins-input" 
            class="time-input" 
            min="0" 
            max="1440" 
            step="1" 
            value="{{ daily_tracker.exercise_mins }}" 
        />
    </div>
    <br>
    <div class="time-input-container">
        <label for="minutes-input" class="label">Prodctive Minutes:</label>
        <input 
            type="number" 
            id="productive-mins-input" 
            class="time-input" 
            min="0" 
            max="1440" 
            step="1" 
            value="{{ daily_tracker.productive_mins }}" 
        />
    </div>
    <br>
    <div class="time-input-container">
        <label for="minutes-input" class="label">Meditation Minutes:</label>
        <input 
            type="number" 
            id="meditation-mins-input" 
            class="time-input" 
            min="0" 
            max="1440" 
            step="1" 
            value="{{ daily_tracker.meditation_mins }}" 
        />
    </div>
    
</div>


<script src="{{ url_for('static', filename='JS/daily-tracker-post.js') }}"> </script>

{% endblock %}
