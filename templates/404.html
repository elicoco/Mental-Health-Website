{% extends "template.html" %}

{% block title %}
Page Not Found
{% endblock %}

{% block main %}
<div style="display:flex; flex-direction:column; align-items:center; justify-content:center; padding: 80px 20px; text-align:center;">
    <h1 style="font-size:80px; color:#4CAF50; margin-bottom:10px;">404</h1>
    <h2 style="font-size:28px; margin-bottom:16px;">Page Not Found</h2>
    <p style="color:#888; font-size:16px; margin-bottom:32px;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('main') }}">
        <button>Go Home</button>
    </a>
</div>
{% endblock %}
